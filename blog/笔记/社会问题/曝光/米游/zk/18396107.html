        ["8", "明日方舟", "Arsonist", "170000", "8227", "529"],
        ["9", "明日方舟", "浸春芜", "260000", "19000", "1293"],
        ["10", "终末地", "My World", "156000", "6076", "511"],
        ["11", "原神", "未行之路", "218000", "18000", "1763"],
        ["12", "碧蓝航线", "周年组曲大串烧", "103000", "5676", "364"],
        ["13", "鸣潮", "愿戴荣光坠入天渊", "240000", "15000", "1090"],
        ["14", "终末地", "万象将醒", "132000", "6334", "593"],
        ["15", "明日方舟", "Radiant", "310000", "21000", "1573"],
        ["16", "绝区零", "原色", "650000", "68000", "6878"],
        ["17", "绝区零", "闪亮", "268000", "21000", "3873"],
        ["18", "星穹铁道", "在银河中孤独摇摆", "503000", "61000", "6278"],
        ["19", "星穹铁道", "希望有羽毛和翅膀", "470000", "43000", "8411"],
        ["20", "终末地", "Under My Breath", "133000", "5682", "464"],

        ["22", "绝区零", "Prophecy预言", "290000", "24000", "2753"],
        ["23", "原神", "我不曾忘记", "940000", "97000", "34000"],
        ["24", "碧蓝航线", "未来Compass", "115000", "3323", "326"],

        ["26", "all", "LINK START!", "249000", "13000", "870"],
        ["27", "原神", "让风告诉你", "356000", "56000", "12000"],
    ];

    let rows = data.slice(1).map(row => {
        const order = row[0];
        const game = row[1];
        const song = row[2];
        const play = Number(row[3]);
        const like = Number(row[4]);
        const coin = Number(row[5]);
        const likePlayRatio = Math.round(play / like);
        const coinPlayRatio = Math.round(play / coin);
        return [order, game, song, play, like, coin, likePlayRatio, coinPlayRatio];
    });

    function formatNum(num) {
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + '万';
        }
        return num.toString();
    }

    let sortKey = '顺序';

    function renderTable() {
        let sortedRows = [...rows];
        switch (sortKey) {
            case '顺序':
                sortedRows.sort((a, b) => Number(a[0]) - Number(b[0]));
                break;
            case '播放量':
                sortedRows.sort((a, b) => b[3] - a[3]);
                break;
            case '点赞':
                sortedRows.sort((a, b) => b[4] - a[4]);
                break;
            case '投币':
                sortedRows.sort((a, b) => b[5] - a[5]);
                break;
            case '赞播比':
                sortedRows.sort((a, b) => a[6] - b[6]);
                break;
            case '币播比':
                sortedRows.sort((a, b) => a[7] - b[7]);
                break;
        }

        let table = document.createElement('table');
        let thead = document.createElement('thead');
        let trHead = document.createElement('tr');
        const thConfig = [
            { text: '顺序', sortKey: '顺序' },
            { text: '游戏', sortKey: null },
            { text: '歌曲', sortKey: null },
            { text: '播放量', sortKey: '播放量' },
            { text: '点赞', sortKey: '点赞' },
            { text: '投币', sortKey: '投币' },
            { text: '赞播比', sortKey: '赞播比' },
            { text: '币播比', sortKey: '币播比' }
        ];
        thConfig.forEach(item => {
            let th = document.createElement('th');
            th.textContent = item.text;
            if (item.sortKey) {
                th.onclick = () => {
                    sortKey = item.sortKey;
                    renderTable();
                };
            }
            trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);

        let tbody = document.createElement('tbody');
        sortedRows.forEach(row => {
            let tr = document.createElement('tr');
            const [order, game, song, play, like, coin, likePlayRatio, coinPlayRatio] = row;
            tr.className = game;
            tr.innerHTML = `
                    <td class="small-text">${order}</td>
                    <td class="small-text">${game}</td>
                    <td>${song}</td>
                    <td>${formatNum(play)}</td>
                    <td>${formatNum(like)}</td>
                    <td>${formatNum(coin)}</td>
                    <td>${likePlayRatio}</td>
                    <td>${coinPlayRatio}</td>
                `;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        const dyContainer = document.getElementById('dy');
        dyContainer.innerHTML = '';
        dyContainer.appendChild(table);
    }

    renderTable();
    
    //代码使用了豆包AI
</script>
