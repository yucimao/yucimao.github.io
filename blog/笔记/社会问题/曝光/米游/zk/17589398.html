<b>为什么鸣潮玩家会来看星穹铁道的直播？</b><br>
他自称是来看热闹的。<br>
<br>

<b>他们为什么不满？</b><br>
他们觉得周年庆直播应该是很正向的，却在这里禁止«鸣潮»，说明«星穹铁道»社区环境很差。<br>
<br>

<b>他们是怎么做的？</b><br>
把这个玩家和QQ群挂在鸣潮和反米社区批判，派人潜入QQ群监视他们的聊天。<br>
<span class='zhushi'>难怪建个交流群还要禁止«鸣潮»……</span>
