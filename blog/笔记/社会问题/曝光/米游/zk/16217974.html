function getDateDiff(aStr, bStr) {
    const parse = s => {
        const [y, m, d] = s.split('.').map(Number);
        return new Date(y, m - 1, d);
    };
    let d1 = parse(aStr), d2 = parse(bStr);
    if (isNaN(d1) || isNaN(d2)) return "";
    if (d1 > d2) [d1, d2] = [d2, d1];

    let year = d2.getFullYear() - d1.getFullYear();
    let month = d2.getMonth() - d1.getMonth();
    let day = d2.getDate() - d1.getDate();

    if (day < 0) month--;
    if (month < 0) {
        year--;
        month += 12;
    }

    return `<small>（${year}年${month}月</small>）`.replace(new RegExp('年0月',"g"),"年");
}
