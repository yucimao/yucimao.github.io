B站160万粉的up主（<a href="https://space.bilibili.com/635041">链接</a>），做过很多原神攻略视频。<br>
但米哈游从不给他商单，过节也不送礼物（网友猜测是因为米哈游严禁代练，而紫薇就在做代练），他赚钱只能靠粉丝打赏和创作激励。<br>
2024年米哈游的创作激励减少了，紫薇还接到了«鸣潮»的商单，自称每个版本都能收到十万，开始在直播里说米哈游坏话。<br>
「我鸣潮一个版本拿十万，我他妈原神做死了我都不可能拿到十万，他就是给的多。」<br>
