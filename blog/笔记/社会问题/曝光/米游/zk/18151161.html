function parseNum(str) {
  if (str.includes("万")) {
    let num = parseFloat(str);
    return num * 10000;
  }
  return parseInt(str.replace("+", ""));
}

function numToWan(num) {
  if (num === 0) return '0';
  const isPositive = num > 0;
  const val = Math.abs(num) / 10000;
  let numStr = val % 1 === 0 ? val.toFixed(0) : val.toFixed(1);
  return isPositive ? `+${numStr}万` : `-${numStr}万`;
}

function formatCell(originStr, diff) {
  if (diff === 0) return originStr;
  const diffText = numToWan(diff);
  return `${originStr}<span class="diff"> (${diffText})</span>`;
}

function createTable(dataList) {
  let html = '<table><tr style="font-weight:bold;position:sticky;top:0;"><td></td><td>播放 <span class="diff">(较上次)</span></td><td>点赞</td><td>投币</td><td>收藏</td><td>观看人数</td></tr>';
  const colCount = dataList[0][1].length;

  for (let i = 0; i < dataList.length; i++) {
    const [timeText, gnsArr, mcArr] = dataList[i];

    html += `<tr><td colspan="${colCount+1}"><b>${timeText}</b></td></tr>`;

    html += '<tr><td>«原神»</td>';
    const gnsDiffList = [];
    for (let j = 0; j < colCount; j++) {
      let curr = parseNum(gnsArr[j]);
      let diff = 0;
      if (i > 0) {
        let prev = parseNum(dataList[i-1][1][j]);
        diff = curr - prev;
      }
      gnsDiffList[j] = diff;
      html += `<td>${formatCell(gnsArr[j], diff)}</td>`;
    }
    html += '</tr>';

    html += '<tr><td>«鸣潮»</td>';
    const mcDiffList = [];
    for (let j = 0; j < colCount; j++) {
      let curr = parseNum(mcArr[j]);
      let diff = 0;
      if (i > 0) {
        let prev = parseNum(dataList[i-1][2][j]);
        diff = curr - prev;
      }
      mcDiffList[j] = diff;
      html += `<td>${formatCell(mcArr[j], diff)}</td>`;
    }
    html += '</tr>';

    html += '<tr class="diff"><td>两者差值</td>';
    for (let j = 0; j < colCount; j++) {
      let gVal = parseNum(gnsArr[j]);
      let mVal = parseNum(mcArr[j]);
      let mainDiff = gVal - mVal;
      let changeDiff = gnsDiffList[j] - mcDiffList[j];

      let mainText = numToWan(mainDiff);
      let changeText = numToWan(changeDiff);

      if (changeDiff === 0) {
        html += `<td>${mainText}</td>`;
      } else {
        html += `<td>${mainText}<span class="diff"> (${changeText})</span></td>`;
      }
    }
    html += '</tr>';

    html += `<tr><td colspan="${colCount+1}"><hr></td></tr>`;
  }
  return html;
}
