2026年6月，主播[喵仙人]发动态夸了«鸣潮»和«赛博朋克：边缘行者»的联动。<br>
晚上直播时，有粉丝说[喵仙人]的动态被“团建”了。<br>
[喵仙人]表示：以前就听说过夸«鸣潮»会被“团建”，没想到是真的。然后去翻动态评论区，但所谓的“团建”只是有人说「最近库洛商单真多」。<br>
[喵仙人]忽然遭到短信轰炸。<br>
社区宣传：「主播只是夸了«鸣潮»，就被米游玩家开盒、短信轰炸。」<br>
第二天白天，米游玩家才在社区宣传里听说此事。<br>
