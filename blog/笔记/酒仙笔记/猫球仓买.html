通用["豆狸的酒宴"]=`一群狸猫围着火堆​跳舞，它们见到我也不惊慌，继续着它们的舞蹈。{<br>}我走近几步，正要开口，一只狸猫先对我招了招手：{<br>}「别急，马上就好，先去那边稍等片刻吧。」{<br>}这时我才注意到，旁边有一个亭子，摆着许多酒坛。{<br>}我在亭子里坐下，等着将要发生的事，心中难免有些不安。{<br>}「豆狸虽没什么妖力，寻美酒的本事倒是不错。」{<br>}不知何时，亭子里多了一位俊秀的美少年，他皮肤白皙，上衣微敞，随意的半躺着。像是自言自语，也像在与我搭话。{<br>}忽然天空下起细雨，却不见乌云，月亮照常挂在天上。{<br>}「成了，成了！」狸猫们欢呼着，一窝蜂的跑去争抢酒坛里的酒喝，很快就醉倒一片。{<br>}远处一个有些佝偻的身影，迈着悠然的步伐，如闲庭信步般悄悄接近，走近了才看清，是一位衣着名贵的光头老者。{<br>}「抱歉抱歉，来晚了。」老人说着抱歉，却丝毫没有道歉的意思，反而带着一抹似有似无的笑意。{<br>}他自顾自的在亭子里找了个位置坐下，笑了笑：「我自罚三杯。」{<br>}美少年抬了抬眉，目光有些不善：「这个酒宴没有邀请你。」{<br>}老头泰然自若的回敬：「但，也没有邀请你。」{<br>}美少年瞥了老头一眼，冷笑道：「这天下的美酒本王想喝就喝，不需要邀请。」{<br>}我忽闻一股烟味。回头望去，原先热烈跳动的火焰此刻变得无精打采，光芒黯淡。{<br>}一缕青烟袅袅升起，如纱一般轻盈，飘进亭子，缭绕片刻后又忽然消散。一片朦胧间，竟走出了一位身姿婀娜、尽显魅惑的美女。{<br>}她款步走到我身旁，轻轻拍了拍我的肩膀，妩媚一笑：「不用理他们，先和姐姐喝一杯吧。」{<br>}`+通用["关闭"];

    配方中提到“暗影”，${名('树脂大师吴暮',1)}说他一直在考虑用一些这个地区残余的煞魔精华做为酿酒材料，我找来了一些，${名('树脂大师吴暮',1)}：「非常好，添加这种材料可以让我们的酒更加香醇。最危险的材料通常都是最美味的。」{<br>}

    我找到了这里最古老的被称作“恐惧之心”的树，弄下${名('一大块固化琥珀',1,"“一块美丽的琥珀。似乎不怎么适宜饮用。”")}。{<br>}

    ["- 93ѣ","提瓦特 荣誉骑士特调屋 甜","基于"+名('雪韵晨晖')+"，调制过程中，不再选用提神的成分，并于焦糖酱的甜味和灵动的微酸之间找到了巧妙的平衡点…",{0:图('安梦蔷薇.png')+`${注释('出自«原神»')}{<br><br><a onclick="选择(1,this)"> - 喝</a>}`+通用["算了"],1:"就像是享用了贵重的甜品后，沿着果酒湖畔散布，吹着轻柔的湖风，松弛而悠闲…真真切切驱离了疲惫感，又不至于太过亢奋。{<br>}"+通用["关闭"]}],
"七时柔灯":
    ["- 93ѣ","提瓦特 荣誉骑士特调屋","“枫丹的优雅特调，被酒客们形容为「描绘着夜里七点柔灯港的暖光」，据传在"+名('锈舵')+"的隐藏酒单中，仍能点到这杯佳品，不过酒保已很难还原其最初的口感…”",{0:图('七时柔灯.png')+`${注释('出自«原神»')}{<br><br><a onclick="选择(1,this)"> - 喝</a>}`+通用["算了"],1:"柔和淡雅，层次分明的口感，结合了几分蒙德特色的香气，风味相当亲切，也避开了可能让人感到不谐的味觉成分。{<br>}"+通用["关闭"]}],
"云风芳迹":
    ["- 93ѣ","提瓦特 荣誉骑士特调屋","基于"+名('七时柔灯')+"，在风轻云淨之日，人们更为敏锐的感官，能使“浑然一体”的饮品风味成倍增色。循着调香的思路，开发了这杯淡雅的杰作…",{0:图('云风芳迹.png')+`${名('艾梅莉挨',1)}评价：「风车菊的花语是‘看得见的风’，你不仅捕捉到了它们的形态，还将它们捎来的香气融入了这杯特调。我提议，这杯特调，就命名为‘云风芳迹’。蒙德的云与风，在杯中旋绕，留下芬芳之痕。」${注释('出自«原神»')}{<br><br><a onclick="选择(1,this)"> - 喝</a>}`+通用["算了"],1:"色彩更加清爽，散发而出的香气，也十分淡雅，符合青色的印象。{<br>}"+通用["关闭"]}],
"星月闪亮饮":

"浪花剑锋曲":

"狼与铁":
    ["- 93ѣ","提瓦特 荣誉骑士特调屋 烈酒","“一次不同寻常的‘攻势’——以薄荷的清凉和植物香气，作为入口时的初次冲击，刻意保留的层次感，足以掩护火水的烈性主力，一锤定音。酸奶油则是阵线末尾的部队，负责严谨殿后，不留疏漏…”",{0:图('狼与铁.png')+`这个杯子是找大团长${名('法尔伽',1)}借的，请注意不要弄坏了。${注释('出自«原神»')}{<br><br><a onclick="选择(1,this)"> - 喝</a>}`+通用["算了"],1:"入口瞬间，薄荷发动清凉的佯攻，暂时掩盖火水的行动。等到那股甜味消散，火水已经滑下喉咙，强劲的酒精味瞬间从口腔中爆发开来，充满冲击感！火水的尾段太过平淡，甚至是纯净无味，一直被人诟病，而酸奶油恰好将口感维持在热烈的峰值！{<br>}"+通用["关闭"]}],

async function 输入(content,id,e){
    stopTyping=false;
    if(Array.isArray(content)){
        content=content[Math.floor(Math.random()*content.length)];
    }
    速度=content.replace(/\{[\s\S]*?\}/g, '').length;
    if(速度>100){速度=10}else if(速度>50){速度=50}else{速度=70}
    if(e){
        if(e.innerHTML==" - 对话"){
            e.outerHTML="";
        }
        else{
            e.outerHTML="<b>"+e.innerHTML+"</b><br><br>";
            document.querySelectorAll('#'+id+' a[onclick*="输入"],#'+id+' .del,#'+id+' a[onclick*="关闭"],#'+id+' a[onclick*="选择"],#'+id+' a[onclick*="通用"]').forEach(el=>el.remove());
        }
    }
    
    const output=document.getElementById(id);
    // output.innerHTML='';
    const parts=content.split(/(\{[^}]+\})/).filter(part=>part!=='');

    for(const part of parts){
        if(stopTyping){output.innerHTML='';break;}
        if(part.startsWith('{')&&part.endsWith('}')){
        output.insertAdjacentHTML('beforeend',part.slice(1,-1));
        }else{await typeCharacters(part,output);}}
    }
async function typeCharacters(text,element){
    const textNode=document.createTextNode('');
    element.appendChild(textNode);

    for(const char of text){
        if(stopTyping){return;}
        await new Promise(resolve=>setTimeout(resolve,速度));
        textNode.data+=char;
    }
}
