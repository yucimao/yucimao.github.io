准备：
<ol>
    <li>4个鸡蛋（不要打散）</li>
    <li>小碗里放入2勺生抽、1勺老抽、1勺耗油、1勺白醋、1勺白砂糖、2勺番茄酱，搅拌。</li>
    <li>蒜片、小米辣。</li>
    <li>葱花。</li>
</ol>
<br>

制作：<ol>
    <li>热锅热油，放入鸡蛋。</li>
    <li>加入蒜片和小米辣。</li>
    <li>倒入调好的料汁。</li>
    <li>等蛋清熟了，大火收汁。</li>
    <li>撒上葱花。</li>
    <li>完成。</li>
</ol>
